# Docker Compose for Local Development
# Services: Redis queue, FastAPI backend, background worker, React frontend + Nginx

services:
  # In-memory data store for job queue and caching.
  redis:
    image: redis:7-alpine
    container_name: disaster-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # FastAPI backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: disaster-api
    environment:
      APP_ENV: local
      API_PREFIX: /api/v1
      LOG_LEVEL: INFO
      QUEUE_BACKEND: rq
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: image-processing
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  # Background worker for async job processing.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: disaster-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: image-processing
      WORKER_API_BASE_URL: http://api:8000/api/v1
      DATABASE_URL: ${DATABASE_URL}
      WORKER_REDACTED_OUTPUT_DIR: /app/data/processed/redacted
    depends_on:
      redis:
        condition: service_healthy

  # React frontend served by Nginx.
  frontend:
    # Optional profile to keep backend-only startup fast during API/worker development.
    profiles: ["frontend"]
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Build-time API base URL for static frontend bundle.
        VITE_API_BASE_URL: http://localhost:8000/api/v1
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY:-}
    container_name: disaster-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
