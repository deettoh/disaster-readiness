# Docker Compose for Local Development
# Services: FastAPI backend, optional React frontend + Nginx

services:
  # FastAPI backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: disaster-api
    env_file:
      - .env
    environment:
      APP_ENV: local
      API_PREFIX: /api/v1
      LOG_LEVEL: INFO
      QUEUE_BACKEND: in_process
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"

  # React frontend served by Nginx.
  frontend:
    # Optional profile to keep backend-only startup fast during API development.
    profiles: ["frontend"]
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Build-time API base URL for static frontend bundle.
        VITE_API_BASE_URL: http://localhost:8000/api/v1
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY:-}
    container_name: disaster-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
