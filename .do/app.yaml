# DigitalOcean App Platform Specification
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: disaster-readiness
region: sgp

services:
  # ── FastAPI backend ──────────────────────────────────────────────
  - name: api
    github:
      repo: deettoh/disaster-readiness
      branch: main
      deploy_on_push: true
    dockerfile_path: apps/api/Dockerfile
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    routes:
      - path: /api
    envs:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: LOG_LEVEL
        value: INFO
      - key: QUEUE_BACKEND
        value: rq
      - key: QUEUE_NAME
        value: image-processing

workers:
  # ── RQ background worker ────────────────────────────────────────
  - name: worker
    github:
      repo: deettoh/disaster-readiness
      branch: main
      deploy_on_push: true
    dockerfile_path: apps/worker/Dockerfile
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    envs:
      - key: QUEUE_NAME
        value: image-processing
      - key: WORKER_API_BASE_URL
        value: ${api.PRIVATE_URL}/api/v1
      - key: WORKER_REDACTED_OUTPUT_DIR
        value: /app/data/processed/redacted

static_sites:
  # ── React frontend (Vite build → DO CDN) ────────────────────────
  - name: frontend
    github:
      repo: deettoh/disaster-readiness
      branch: main
      deploy_on_push: true
    source_dir: apps/frontend
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      - key: VITE_API_BASE_URL
        value: ${api.PUBLIC_URL}/api/v1
      - key: VITE_MAPTILER_KEY
        type: SECRET
    routes:
      - path: /
    catchall_document: index.html
